a { color:var(--accent); text-decoration:none; font-weight:700; }

ranial cavity and the ability to sample the tumour’s micro-environment. However, the translation of this technique to efficient drug delivery has not been systematically studied. In this work, we present an experimental platform to evaluate the performance of microdialysis devices in reverse mode in a brain tissue phantom. The mass of model drug delivered is measured by computing absorbance fields from optical images. Concentration maps are reconstructed using a modern and open-source implementation of the inverse Abel transform. To illustrate our method, we assess the capability of a commercial probe in delivering methylene blue to a gel phantom. We find that the delivery rate can be described by classical microdialysis theory, except at low dialysate flow rates where it is impacted by gravity, and high flow rates where significant convection to the gel occurs. We also show that the flow rate has an important impact not only on the overall size of the drug plume, but also on its shape. The numerical tools developed for this study have been made freely available to ensure that the method presented can be used to rapidly and inexpensively optimise probe design and protocol parameters before proceeding to more in-depth studies. Bioavailability in the brain of systemically-administered drugs is generally poor due to the blood-brain barrier. This has largely hindered the development of new therapeutic options, especially for the treatment of brain cancers. Many targeted drug delivery techniques have been proposed to overcome this c­ hallenge1,2. For non- resectable tumours in particular, the possibility to insert catheters or implants, analogously to standard biopsy procedures, has been explored in a variety of ways, for example in Convection-Enhanced Delivery (CED)3–6, ­electrokinetic7 or ­electrophoretic8 delivery, gel i­ mplants9,10, or ­retrodialysis2,11–18. CED, the leading experimental treatment among these techniques, consists of injecting drug solutions with a catheter directly to the tumour site. A major challenge is to reach a reasonable infusion rate while avoiding over- pressure in the intracranial space and reflux along the catheter ­port19. By contrast, when using a microdialysis probe in reverse mode the drug solution (dialysate) flows through a closed channel and leaves at an outlet, as depicted in Fig. 1. Therapeutic agents are delivered by diffusion through a membrane with no net fluid flow and therefore no hydrostatic pressure increase. The absence of reflux along the insertion pathway is also beneficial for wound healing after surgery. An additional advantage of microdialysis is the ability to sample the tumour micro-environment and adapt the treatment s­ trategy12,17,20. However microdialysis probes and accessories have been designed and optimised to measure solute concentrations and their translation to efficient drug delivery devices has not been systematically studied. In particular, a system to measure the release of a dye as a drug model to a brain tissue phantom would be beneficial for the rapid optimisation of the design and operating conditions of microdialysis probes in reverse mode. In the context of CED, Sindhwani et al.21 developed an instrument to study the delivery and reflux of a dye solution to an agarose gel. Their methodology relies on carefully controlled absorbance images and a tailored concentration reconstruction algorithm. Since it is entirely based on optical imaging it does not require the use", "authors": "of expensive equipment such as X-ray or MRI scanners. We show further improvements to this technique, such as the use of a band-pass optical filter which extends the applicability of Beer-Lambert law of absorbance and", "affiliations": "Department of Engineering, Institute for Manufacturing, University of Cambridge, 17 Charles Babbage Road, Cambridge CB3 0FS, UK. *email: ecr43@cam.ac.uk Scientific Reports | (2023) 13:1900 | https://doi.org/10.1038/s41598-023-28915-3 1 Vol.:(01234567 const stats = {"scheduled_entries": 329, "indexed_entries": 443, "pdf_count": 421};
const q = document.getElementById('q');
const day = document.getElementById('day');
const session = document.getElementById('session');
const list = document.getElementById('list');
const summary = document.getElementById('summary');
function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uniq(a) { return [...new Set(a.filter(Boolean))]; }
for (const d of uniq(records.map(r => r.day))) day.add(new Option(d, d));
function refreshSessions() {
  const ds = day.value;
  const sessions = uniq(records.filter(r => !ds || r.day === ds).map(r => r.session_label));
  session.innerHTML = '<option value="">All sessions</option>';
  for (const s of sessions) session.add(new Option(s, s));
}
function matches(r) {
  const needle = q.value.trim().toLowerCase();
  if (day.value && r.day !== day.value) return false;
  if (session.value && r.session_label !== session.value) return false;
  if (!needle) return true;
  return r.search.includes(needle);
}
function render() {
  const rows = records.filter(matches);
  summary.textContent = `${rows.length} shown / ${records.length} entries. Generated from ${stats.scheduled_entries} scheduled entries and ${stats.pdf_count} PDFs.`;
  if (!rows.length) { list.innerHTML = '<div class="empty">No matching abstracts.</div>'; return; }
  let html = '', last = '';
  for (const r of rows) {
    const group = `${r.day || 'Other'} · ${r.session_label || 'Unscheduled'}`;
    if (group !== last) { html += `<h2 class="group">${esc(group)}</h2>`; last = group; }
    html += `<article class="card">
      <div class="meta">${esc(r.time || '')} · ID ${esc(r.id)} · ${esc(r.room || '')} · ${esc(r.code || '')}</div>
      <div class="title">${esc(r.title || 'Untitled abstract')}</div>
      <div class="authors">${esc(r.authors || '')}</div>
      <div class="aff">${esc(r.affiliations || '')}</div>
      <p><a href="${r.url}" target="_blank" rel="noopener">Open abstract PDF</a></p>
    </article>`;
  }
  list.innerHTML = html;
}
day.addEventListener('change', () => { refreshSessions(); render(); });
session.addEventListener('change', render);
q.addEventListener('input', render);
refreshSessions();
render();
</script>
