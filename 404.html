<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="canonical" href="https://imlab-nycu.github.io/" />
    <title>Intelligent Microsystem Lab</title>
    <script>
      const oldBase = '/imlab-website';
      const path = location.pathname.startsWith(oldBase)
        ? location.pathname.slice(oldBase.length)
        : '/';
      const target = new URL(path || '/', 'https://imlab-nycu.github.io');
      target.search = location.search;
      target.hash = location.hash;
      location.replace(target.href);
    </script>
  </head>
  <body>
    <p><a href="https://imlab-nycu.github.io/">Intelligent Microsystem Lab has moved.</a></p>
  </body>
</html>
